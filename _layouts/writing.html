---
layout: default
---
<article class="writing">
  <header class="artwork-header">
    <div class="artwork-meta">
      <span class="artwork-type literatura">literatura</span>
      {% if page.date %}
        <span class="separator">/</span>
        <time datetime="{{ page.date | date_to_xmlschema }}">
          {{ page.date | date: "%Y" }}
        </time>
      {% endif %}
    </div>
    <h1 class="artwork-title">{{ page.title }}</h1>
    {% if page.medium %}
      <p class="artwork-medium">{{ page.medium }}</p>
    {% endif %}
  </header>

  <div class="writing-body prose">
    {% if page.image %}
      <figure class="writing-figure">
        <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
        {% if page.image_caption %}
          <figcaption>{{ page.image_caption }}</figcaption>
        {% endif %}
      </figure>
    {% endif %}

    {{ content }}
  </div>

  <footer class="artwork-footer">
    <a href="{{ '/atelier' | relative_url }}" class="back-link">
      <span class="arrow">&larr;</span> Voltar ao Atelie
    </a>
  </footer>
</article>
